<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>HydroSense - Iniciar Sesión</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #2c3e50; /* Color del sidebar para coherencia */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 350px;
            text-align: center;
        }
        .login-card h2 { color: #0056b3; margin-bottom: 20px; }
        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #00a8e8;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-btn:hover { background: #0056b3; }
        .error-msg { color: red; font-size: 0.8rem; display: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="Faca.png" alt="Logo" style="width: 80px; margin-bottom: 10px;">
        <h2>HydroSense</h2>
        <p style="color: #666; font-size: 0.9rem;">Gestión Hídrica Facatativá</p>
        
        <form id="loginForm">
            <input type="text" id="userInput" placeholder="Usuario (admin)" required>
            <input type="password" id="passInput" placeholder="Contraseña (1234)" required>
            <p id="error" class="error-msg">Usuario o contraseña incorrectos</p>
            <button type="submit" class="login-btn">INGRESAR AL SISTEMA</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue
            
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

        
            if (user === 'admin' && pass === '1234') {
                window.location.href = 'Interfaz.html'; // REDIRIGE A LA VISTA PRINCIPAL
            } else {
                document.getElementById('error').style.display = 'block';
            }
        });
    </script>

</body>
</html>
